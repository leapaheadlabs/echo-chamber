name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: false
      - name: Install dependencies
        run: poetry install --no-interaction --only main,dev
      - name: ruff check
        run: poetry run ruff check src/ tests/
      - name: ruff format (check)
        run: poetry run ruff format --check src/ tests/

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: false
      - name: Install dependencies
        run: poetry install --no-interaction --only main,dev
      - name: mypy
        run: poetry run mypy src/ tests/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: echo_test
          POSTGRES_DB: echo_chamber_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: false
      - name: Install dependencies
        run: poetry install --no-interaction --only main,dev
      - name: pytest
        env:
          DATABASE_URL: postgresql+asyncpg://echo:echo_test@localhost:5432/echo_chamber_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: poetry run pytest --cov=src --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit[toml]
      - name: bandit scan
        run: bandit -c pyproject.toml -r src/ -f sarif -o bandit.sarif || true
      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit