---
name: CI

permissions:
  contents: read

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: false
      - name: Install dependencies
        run: poetry install --no-interaction --only main,dev
      - name: ruff check
        run: poetry run ruff check src/ tests/
      - name: ruff format (check)
        run: poetry run ruff format --check src/ tests/

  repo-quality-gate:
    name: enterprise-quality/repo-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run repository quality gate
        run: python scripts/legend-claw-quality-gate.py

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: false
      - name: Install dependencies
        run: poetry install --no-interaction --only main,dev
      - name: mypy
        run: poetry run mypy src/ tests/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: echo_test
          POSTGRES_DB: echo_chamber_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: false
      - name: Install dependencies
        run: poetry install --no-interaction --only main,dev
      - name: pytest
        env:
          DB_PASSWORD: echo_test
          ENVIRONMENT: test
        run: >-
          poetry run pytest
          --cov=src
          --cov-report=xml
          --cov-report=term-missing
          -v
      - name: Commit coverage report
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f coverage.xml
          git diff --cached --quiet || git commit -m "chore: update coverage.xml [skip ci]"
          git push origin HEAD:${{ github.head_ref }} || true

  bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit[toml]
      - name: bandit scan
        run: bandit -c pyproject.toml -r src/ -f json -o bandit.json
      - name: Upload bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit.json
          retention-days: 7
