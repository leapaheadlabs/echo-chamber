name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: semgrep ci
        run: |
          semgrep ci \
            --config=auto \
            --config=.semgrep.yml \
            --sarif=semgrep.sarif \
            --error=false \
            --no-suppress-errors || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks detect
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE_KEY: ${{ secrets.GITLEAKS_LICENSE_KEY }}
          GITLEAKS_CONFIG: .gitleaks.toml
        continue-on-error: true
      - name: gitleaks (baseline mode — no license)
        if: env.GITLEAKS_LICENSE_KEY == ''
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMIT_SCAN: 'true'
          GITLEAKS_ENABLE_REDACT: 'true'

  checkov:
    name: Checkov (IaC)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Checkov — Dockerfiles
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          soft_fail: false
          output_format: sarif
          output_file_path: checkov-dockerfile.sarif
        env:
          PRISMA_API_KEY: ${{ secrets.PRISMA_API_KEY }}
        continue-on-error: true
      - name: Checkov — GitHub Actions
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/workflows
          framework: github_actions
          soft_fail: true
          output_format: sarif
          output_file_path: checkov-gha.sarif
        env:
          PRISMA_API_KEY: ${{ secrets.PRISMA_API_KEY }}
        continue-on-error: true
      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-dockerfile.sarif
          category: checkov