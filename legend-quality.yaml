---
version: 1
repo: "echo-chamber"
detectedLanguages:
  - "python"
sonar:
  projectKey: "echo-chamber"
  sources:
    - "src"
  exclusions:
    - "**/.git/**"
    - "**/.scannerwork/**"
    - "**/.trunk/**"
    - "**/node_modules/**"
    - "**/coverage/**"
    - "**/target/**"
    - "**/build/**"
    - "**/dist/**"
    - "**/.next/**"
    - "**/scripts/**"
  coverage:
    type: "coverage.py"
    path: "coverage.xml"
    command: >-
      pip install -r requirements-dev.txt &&
      pytest --cov=src --cov-report=xml
    sonarProperty: "sonar.python.coverage.reportPaths"
  coverageReports:
    -
      language: "python"
      type: "coverage.py"
      path: "coverage.xml"
      command: >-
        pip install -r requirements-dev.txt &&
        pytest --cov=src --cov-report=xml
      sonarProperty: "sonar.python.coverage.reportPaths"
  coverageExclusions:
    - "tests/**"
    - "scripts/**"
    - "alembic/**"
  requireServerGate: false
toolchain:
  python: "3.12"
parity:
  mode: "exact"
  repoOverrides:
    trunkYaml: "ignored"
    sonarProjectProperties: "coverage-hints-only"
status: "active"
