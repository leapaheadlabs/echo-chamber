---
version: 1
repo: "echo-chamber"
detectedLanguages:
  - python

sonar:
  projectKey: "echo-chamber"
  sources:
    - "."
  exclusions:
    - "**/.git/**"
    - "**/.scannerwork/**"
    - "**/.trunk/**"
    - "**/node_modules/**"
    - "**/coverage/**"
    - "**/target/**"
    - "**/build/**"
    - "**/dist/**"
    - "**/.next/**"
    - ".github/**"
    - "scripts/**"
    - "alembic/**"
    - "tests/**"
  coverage:
    type: "coverage.py"
    path: "coverage.xml"
    command: >-
      python3 -m pip install -r requirements-dev.txt &&
      python3 -m pytest --cov=src --cov-report=xml
    sonarProperty: "sonar.python.coverage.reportPaths"
  coverageReports:
    -
      language: "python"
      type: "coverage.py"
      path: "coverage.xml"
      command: >-
        python3 -m pip install -r requirements-dev.txt &&
        python3 -m pytest --cov=src --cov-report=xml
      sonarProperty: "sonar.python.coverage.reportPaths"

  requireServerGate: true
toolchain:
  python:
    version: "3.12+"
    linter: "ruff"
    formatter: "ruff"
    typechecker: "mypy"

parity:
  mode: "exact"
  repoOverrides:
    trunkYaml: "ignored"
    sonarProjectProperties: "coverage-hints-only"
status: "active"
