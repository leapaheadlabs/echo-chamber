sonar.projectKey=leapaheadlabs_echo-chamber
sonar.projectName=ECHO CHAMBER
sonar.projectVersion=0.1.0
sonar.organization=leapaheadlabs

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Coverage (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude generated / config / skeleton init files from coverage
sonar.coverage.exclusions=\
  src/echo_chamber/__init__.py,\
  src/echo_chamber/cortex/__init__.py,\
  src/echo_chamber/api/__init__.py,\
  src/echo_chamber/db/init.sql

# Exclude test files from duplication and code smells
sonar.test.inclusions=tests/**
