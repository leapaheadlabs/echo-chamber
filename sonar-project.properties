sonar.projectKey=leapaheadlabs_echo-chamber
sonar.projectName=ECHO CHAMBER
sonar.projectVersion=0.1.0
sonar.organization=leapaheadlabs

# Only analyze Python sources (not docs, CI, config, etc.)
sonar.sources=src/echo_chamber
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

sonar.python.coverage.reportPaths=coverage.xml

# Exclude non-code files from coverage calculation
sonar.coverage.exclusions=tests/**
